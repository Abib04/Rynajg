<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Factory Data - Yearly Recap</title>

    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121826">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Header Section -->
        <header class="dashboard-header">
            <div class="header-content">
                <div>
                    <h1>Yearly Recap</h1>
                    <p class="subtitle">Monthly Forecast &amp; Actual — Per Year</p>
                </div>
                <div class="header-actions">
                    <div class="status-indicator">
                        <span class="dot"></span>
                        <span id="last-updated">Menunggu Data...</span>
                    </div>

                    <!-- Year Filter -->
                    <select id="year-filter" class="table-card"
                        style="padding: 0.5rem; border-radius: 6px; border: 1px solid #1e293b; background: #0f172a; color: #f8fafc; font-family: inherit; font-size: 0.875rem; cursor: pointer; outline: none; margin-right: 0.5rem;">
                        <option value="">Loading...</option>
                    </select>

                    <!-- Section Filter -->
                    <select id="section-filter" class="table-card"
                        style="padding: 0.5rem; border-radius: 6px; border: 1px solid #1e293b; background: #0f172a; color: #f8fafc; font-family: inherit; font-size: 0.875rem; cursor: pointer; outline: none; margin-right: 0.5rem;">
                        <option value="ALL">All Regions</option>
                        <option value="US">United States</option>
                        <option value="AU">Australia</option>
                        <option value="EZ">Euro Area</option>
                        <option value="UK">United Kingdom</option>
                        <option value="JP">Japan</option>
                        <option value="NZ">New Zealand</option>
                        <option value="SZ">Swiss</option>
                        <option value="CA">Canada</option>
                    </select>

                    <!-- Back -->
                    <a href="index.html" class="btn-primary" style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); margin-right: 0.5rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        Dashboard
                    </a>

                    <!-- Export -->
                    <button id="export-recap-btn" class="btn-primary" style="background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); margin-right: 0.5rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Export Excel
                    </button>

                    <!-- Refresh -->
                    <button id="refresh-btn" class="btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 2v6h-6"></path>
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v6h6"></path>
                        </svg>
                        Perbarui
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main" style="max-width:100%;padding-left:1rem;padding-right:1rem;">
            <div id="recap-container">
                <!-- Sections injected here by JS -->
                <div style="text-align:center;padding:3rem;color:#94a3b8;">
                    <div class="loader" style="margin:0 auto 1rem;"></div>
                    <p>Mengambil data dari server...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- ExcelJS -->
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <!-- Recap Logic -->
    <script src="recap.js"></script>
</body>

</html>
