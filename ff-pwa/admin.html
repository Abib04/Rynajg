<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Manual Data Entry</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
        body {
            padding-top: 2rem;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .admin-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-control,
        .form-select {
            background-color: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #f8fafc !important;
            border-radius: 10px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25) !important;
            border-color: #3b82f6 !important;
        }

        .btn-submit {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 10px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>

<body>
    <div class="container pb-5">
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <h2 class="fw-bold mb-0">Admin Panel <span class="text-muted"
                    style="font-size:1rem; font-weight:normal;">Data Entry</span></h2>
            <a href="index.html" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Back to Dashboard</a>
        </div>

        <div class="admin-card max-w-md mx-auto">
            <form id="admin-form">
                <div id="alert-box" class="alert d-none" role="alert"></div>

                <div class="mb-3">
                    <label class="form-label text-secondary small">Select Indicator</label>
                    <select class="form-select" id="indicator" required>
                        <option value="">Loading indicators...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary small">Date <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="date" placeholder="e.g. Feb 13, 2026 OR Jan 2026"
                        required>
                    <div class="form-text text-muted" style="font-size: 0.75rem;">Harus pakai Bahasa Inggris sesuai
                        referensi (Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec).</div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-secondary small">Actual</label>
                        <input type="text" class="form-control" id="actual" placeholder="e.g. 0.3% / 150K">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-secondary small">Forecast</label>
                        <input type="text" class="form-control" id="forecast" placeholder="e.g. 0.2% / 140K">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-secondary small">Previous</label>
                        <input type="text" class="form-control" id="previous" placeholder="e.g. 0.1% / 100K">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-submit w-100 py-2 mt-3" id="save-btn">
                    Save Historical Data
                </button>
            </form>
        </div>

        <!-- Live Preview / Latest Insertions -->
        <div class="mt-5">
            <h5 class="text-secondary mb-3">Recent Manual Submissions (Current Session)</h5>
            <div class="table-responsive rounded shadow-sm border border-secondary"
                style="border-color: rgba(255,255,255,0.05) !important;">
                <table class="table table-dark table-hover mb-0" style="background-color: transparent;">
                    <thead>
                        <tr class="text-muted small">
                            <th>ID</th>
                            <th>Date</th>
                            <th>Actual</th>
                            <th>Forecast</th>
                            <th>Previous</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="log-body">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-3">No data saved yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
